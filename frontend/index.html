<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Legal Form Assistant</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>AI Legal Form Assistant</h1>
      <p>I will help you fill your government form step by step.</p>

      <div id="chatBox" class="chat-box">
        <div class="bot msg">
          Hello! I can help you fill a PAN card demo form.
        </div>
      </div>

      <div class="input-row">
        <input id="userInput" placeholder="Type your answer..." />
        <button id="sendBtn" type="button" class="send-btn">Send</button>
      </div>

      <button id="generateBtn" type="button" class="generate-btn">
        Generate Form
      </button>

      <div id="result"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
